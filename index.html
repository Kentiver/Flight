<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flight Radar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: rgba(0,255,65,0.55);
    --green-faint: rgba(0,255,65,0.15);
    --green-ghost: rgba(0,255,65,0.07);
    --red: #ff4141;
    --bg: #000;
    --bg-dark: #000a00;
  }

  html, body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    height: 100%;
    overflow: hidden;
  }

  /* ── scanline overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,65,0.025) 2px,
      rgba(0,255,65,0.025) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 12px;
    gap: 10px;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--green-faint);
    padding-bottom: 8px;
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--green);
  }

  .logo span { color: var(--green-dim); font-size: 11px; letter-spacing: 2px; margin-left: 10px; }

  #controls {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--green-dim);
  }

  #controls label { display: flex; align-items: center; gap: 6px; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    background: var(--green-faint);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--green);
    border-radius: 50%;
  }

  #blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── main content ── */
  #main {
    display: flex;
    flex: 1;
    gap: 12px;
    min-height: 0;
  }

  /* ── radar canvas ── */
  #radar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  #radar-wrap canvas {
    border-radius: 50%;
    display: block;
  }

  /* ── right panel ── */
  #panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
    overflow: hidden;
  }

  /* ── selected aircraft card ── */
  #sel-card {
    border: 1px solid var(--green-faint);
    padding: 10px 12px;
    font-size: 11px;
    line-height: 2;
    flex-shrink: 0;
    min-height: 100px;
    background: var(--bg-dark);
  }

  #sel-card .callsign-big {
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--green);
    margin-bottom: 6px;
  }

  #sel-card .route {
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--green);
    margin-bottom: 4px;
  }

  #sel-card .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 16px;
  }

  #sel-card .lbl { color: var(--green-dim); }

  /* ── flight list ── */
  #list-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #list-hdr {
    display: grid;
    grid-template-columns: 70px 50px 45px 45px 1fr;
    gap: 4px;
    font-size: 10px;
    color: var(--green-dim);
    border-bottom: 1px solid var(--green-ghost);
    padding-bottom: 4px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  #flight-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--green-faint) transparent;
  }

  #flight-list::-webkit-scrollbar { width: 4px; }
  #flight-list::-webkit-scrollbar-thumb { background: var(--green-faint); }

  .fl {
    display: grid;
    grid-template-columns: 70px 50px 45px 45px 1fr;
    gap: 4px;
    font-size: 10px;
    padding: 4px 0;
    border-bottom: 1px solid var(--green-ghost);
    cursor: pointer;
    transition: background 0.1s;
    align-items: center;
  }

  .fl:hover { background: var(--green-ghost); }
  .fl.sel { background: var(--green-faint); }
  .fl .cs { color: var(--green); font-size: 11px; }
  .fl .muted { color: var(--green-dim); }
  .fl .route-short { color: var(--green-dim); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── bottom bar ── */
  #botbar {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--green-dim);
    border-top: 1px solid var(--green-ghost);
    padding-top: 6px;
    flex-shrink: 0;
  }

  /* ── splash ── */
  #splash {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  #splash h1 { font-size: 28px; letter-spacing: 6px; }
  #splash p { font-size: 12px; color: var(--green-dim); }

  .btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 28px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--green-ghost); }
  .btn.secondary { border-color: var(--green-dim); color: var(--green-dim); font-size: 11px; padding: 7px 20px; }

  #err-msg { color: var(--red); font-size: 11px; min-height: 16px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div style="font-size:11px;letter-spacing:3px;color:var(--green-dim)">◈ SYSTEM READY</div>
  <h1>FLIGHT RADAR</h1>
  <p>Location access is used to centre the radar on your position.</p>
  <button class="btn" onclick="requestLoc()">◈ USE MY LOCATION</button>
  <button class="btn secondary" onclick="useOslo()">USE DEMO — OSLO, NORWAY</button>
  <div id="err-msg"></div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div class="logo">◈ FLIGHT RADAR <span id="pos-lbl"></span></div>
    <div id="controls">
      <label>RANGE <input type="range" id="range-sl" min="50" max="500" value="150" step="25"> <span id="range-lbl">150 km</span></label>
      <div><span id="blink">█</span> LIVE</div>
    </div>
  </div>

  <div id="main">
    <div id="radar-wrap">
      <canvas id="c-static"></canvas>
      <canvas id="c-sweep" style="position:absolute;top:0;left:0;border-radius:50%"></canvas>
      <canvas id="c-blips" style="position:absolute;top:0;left:0;border-radius:50%"></canvas>
    </div>

    <div id="panel">
      <div id="sel-card">
        <div style="color:var(--green-dim);font-size:11px">SELECT AN AIRCRAFT TO SEE DETAILS</div>
      </div>
      <div id="list-section">
        <div id="list-hdr">
          <span>CALLSIGN</span><span>ALT ft</span><span>HDG°</span><span>SPD kn</span><span>ROUTE</span>
        </div>
        <div id="flight-list"></div>
      </div>
    </div>
  </div>

  <div id="botbar">
    <span id="traffic-lbl">TRAFFIC: —</span>
    <span id="time-lbl"></span>
    <span id="api-lbl"></span>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let userLat = 59.9139, userLon = 10.7522;
let radiusKm = 150;
let flights = [];
let selected = null;
let sweepAngle = 0;
let raf;

// Canvas size — fit to viewport on init
let C = 340;

// Airport lookup cache  { icao: {iata, name, city, country} }
const airports = {};
// Route cache { icao24: {origin, dest} }
const routeCache = {};
// In-flight route fetch set (avoid duplicate fetches)
const fetchingRoutes = new Set();

// ── Airport data (top ~3000 airports from ourairports, embedded subset) ─────
// We'll fetch from a public JSON; fall back to ICAO code if unavailable
async function loadAirports() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/datasets/airport-codes/master/data/airport-codes.csv');
    const text = await r.text();
    const lines = text.split('\n').slice(1);
    lines.forEach(line => {
      // ident,type,name,elevation_ft,continent,iso_country,iso_region,municipality,gps_code,iata_code,local_code,coordinates
      const cols = parseCSVLine(line);
      if (!cols || cols.length < 11) return;
      const ident = cols[0]?.replace(/"/g,'').trim();
      const type = cols[1]?.replace(/"/g,'').trim();
      if (!ident || !['large_airport','medium_airport','small_airport'].includes(type)) return;
      const iata = cols[9]?.replace(/"/g,'').trim();
      const city = cols[7]?.replace(/"/g,'').trim();
      const country = cols[5]?.replace(/"/g,'').trim();
      const name = cols[2]?.replace(/"/g,'').trim();
      airports[ident] = { iata: iata || ident, city: city || name, country, name };
    });
  } catch(e) {
    console.warn('Airport data unavailable, using ICAO codes', e);
  }
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

function airportLabel(icao) {
  if (!icao) return null;
  const a = airports[icao.toUpperCase()];
  if (a && a.city) return a.iata && a.iata !== icao ? `${a.city} (${a.iata})` : a.city;
  return icao.toUpperCase();
}

// ── Fetch route for a flight from OpenSky ────────────────────────────────────
async function fetchRoute(icao24, callsign) {
  if (routeCache[icao24] || fetchingRoutes.has(icao24)) return;
  fetchingRoutes.add(icao24);
  try {
    // OpenSky route endpoint
    const url = `https://opensky-network.org/api/routes?callsign=${encodeURIComponent(callsign.trim())}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('no route');
    const data = await r.json();
    routeCache[icao24] = {
      origin: data.route?.[0] || null,
      dest: data.route?.[data.route.length - 1] || null
    };
  } catch {
    routeCache[icao24] = { origin: null, dest: null };
  } finally {
    fetchingRoutes.delete(icao24);
    // Re-render list to pick up new route data
    renderList();
    if (selected && selected.icao24 === icao24) renderCard();
  }
}

// ── Geo helpers ───────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ── Canvas setup ──────────────────────────────────────────────────────────────
function setupCanvases() {
  // Size radar to fit available height roughly
  const avail = Math.min(window.innerHeight - 100, window.innerWidth * 0.45, 500);
  C = Math.max(260, Math.floor(avail / 2) * 2); // keep even
  ['c-static','c-sweep','c-blips'].forEach(id => {
    const el = document.getElementById(id);
    el.width = C; el.height = C;
  });
}

// ── Static radar drawing ──────────────────────────────────────────────────────
function drawStatic() {
  const cv = document.getElementById('c-static');
  const ctx = cv.getContext('2d');
  const cx = C/2, cy = C/2, r = C/2 - 2;
  ctx.clearRect(0,0,C,C);

  // background
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = '#000a00'; ctx.fill();

  // rings
  [0.25,0.5,0.75,1].forEach((f,i) => {
    ctx.beginPath(); ctx.arc(cx, cy, r*f, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,65,${0.1 + i*0.06})`; ctx.lineWidth = 0.5; ctx.stroke();
    // range label
    const km = Math.round(radiusKm * f);
    ctx.font = `9px 'Share Tech Mono', monospace`;
    ctx.fillStyle = 'rgba(0,255,65,0.3)';
    ctx.fillText(km+'km', cx+3, cy - r*f + 10);
  });

  // crosshairs
  [0,45,90,135].forEach(a => {
    const rad = a * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(rad)*6, cy + Math.sin(rad)*6);
    ctx.lineTo(cx + Math.cos(rad)*r, cy + Math.sin(rad)*r);
    ctx.moveTo(cx - Math.cos(rad)*6, cy - Math.sin(rad)*6);
    ctx.lineTo(cx - Math.cos(rad)*r, cy - Math.sin(rad)*r);
    ctx.strokeStyle = 'rgba(0,255,65,0.12)'; ctx.lineWidth = 0.5; ctx.stroke();
  });

  // cardinal labels
  [['N',270],['E',0],['S',90],['W',180]].forEach(([d,a]) => {
    const rad = a * Math.PI / 180;
    ctx.font = `10px 'Share Tech Mono', monospace`;
    ctx.fillStyle = 'rgba(0,255,65,0.4)'; ctx.textAlign = 'center';
    ctx.fillText(d, cx + Math.cos(rad)*(r-14), cy + Math.sin(rad)*(r-14) + 4);
  });

  // centre dot
  ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,65,0.6)'; ctx.fill();
}

// ── Sweep animation ───────────────────────────────────────────────────────────
function animateSweep() {
  const cv = document.getElementById('c-sweep');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  const cx = C/2, cy = C/2, r = C/2 - 2;
  sweepAngle = (sweepAngle + 0.018) % (Math.PI * 2);

  ctx.clearRect(0,0,C,C);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();

  // fade trail
  const trailLen = Math.PI * 0.65;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.arc(cx, cy, r, sweepAngle - trailLen, sweepAngle);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,255,65,0.055)'; ctx.fill();

  // sweep line
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(sweepAngle)*r, cy + Math.sin(sweepAngle)*r);
  ctx.strokeStyle = 'rgba(0,255,65,0.85)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  drawBlips();
  raf = requestAnimationFrame(animateSweep);
}

// ── Flight blips ──────────────────────────────────────────────────────────────
function drawBlips() {
  const cv = document.getElementById('c-blips');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  const cx = C/2, cy = C/2, r = C/2 - 8;
  ctx.clearRect(0,0,C,C);

  flights.forEach(f => {
    const dist = haversine(userLat, userLon, f.lat, f.lon);
    if (dist > radiusKm) return;
    const brg = bearing(userLat, userLon, f.lat, f.lon);
    const ang = (brg - 90) * Math.PI / 180;
    const ratio = dist / radiusKm;
    const x = cx + Math.cos(ang) * ratio * r;
    const y = cy + Math.sin(ang) * ratio * r;
    const isSel = selected && selected.icao24 === f.icao24;

    // blip
    ctx.beginPath(); ctx.arc(x, y, isSel ? 5 : 3, 0, Math.PI*2);
    ctx.fillStyle = isSel ? '#ffffff' : '#00ff41'; ctx.fill();
    if (isSel) { ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 1.5; ctx.stroke(); }

    // heading tick
    if (f.heading != null) {
      const hrad = (f.heading - 90) * Math.PI / 180;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(hrad)*9, y + Math.sin(hrad)*9);
      ctx.strokeStyle = isSel ? 'rgba(255,255,255,0.6)' : 'rgba(0,255,65,0.5)';
      ctx.lineWidth = 1; ctx.stroke();
    }

    // callsign label (only if not too crowded near edge)
    if (ratio < 0.88 && f.callsign) {
      ctx.font = `8px 'Share Tech Mono', monospace`;
      ctx.fillStyle = isSel ? 'rgba(255,255,255,0.9)' : 'rgba(0,255,65,0.75)';
      ctx.textAlign = 'left';
      ctx.fillText(f.callsign.trim().slice(0,8), x+6, y-2);
    }
  });
}

// ── Render selected card ──────────────────────────────────────────────────────
function renderCard() {
  const el = document.getElementById('sel-card');
  if (!selected) {
    el.innerHTML = '<div style="color:var(--green-dim);font-size:11px">SELECT AN AIRCRAFT TO SEE DETAILS</div>';
    return;
  }
  const f = selected;
  const dist = haversine(userLat, userLon, f.lat, f.lon);
  const route = routeCache[f.icao24];
  const originLabel = route?.origin ? airportLabel(route.origin) : (route ? '—' : '...');
  const destLabel   = route?.dest   ? airportLabel(route.dest)   : (route ? '—' : '...');
  const routeLine = (route?.origin || route?.dest)
    ? `${route.origin || '?'} → ${route.dest || '?'}`
    : '';

  el.innerHTML = `
    <div class="callsign-big">${f.callsign || f.icao24}</div>
    ${routeLine ? `<div class="route">✈ ${originLabel || route.origin} → ${destLabel || route.dest}</div>` : '<div style="color:var(--green-dim);font-size:11px">ROUTE: FETCHING...</div>'}
    <div class="grid2">
      <div><span class="lbl">ALTITUDE  </span><span>${f.alt ? f.alt.toLocaleString() + ' ft' : '—'}</span></div>
      <div><span class="lbl">SPEED     </span><span>${f.speed ? f.speed + ' kn' : '—'}</span></div>
      <div><span class="lbl">HEADING   </span><span>${f.heading != null ? f.heading + '°' : '—'}</span></div>
      <div><span class="lbl">DISTANCE  </span><span>${Math.round(dist)} km</span></div>
      <div><span class="lbl">COUNTRY   </span><span>${f.country || '—'}</span></div>
      <div><span class="lbl">ICAO24    </span><span>${f.icao24}</span></div>
    </div>
  `;
}

// ── Render flight list ────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('flight-list');
  const sorted = [...flights].sort((a,b) => (b.alt||0)-(a.alt||0));
  el.innerHTML = sorted.map(f => {
    const isSel = selected && selected.icao24 === f.icao24;
    const route = routeCache[f.icao24];
    let routeStr = '';
    if (route?.origin || route?.dest) {
      const o = route.origin ? (airports[route.origin]?.iata || route.origin) : '?';
      const d = route.dest   ? (airports[route.dest]?.iata   || route.dest)   : '?';
      routeStr = `${o}→${d}`;
    } else if (route) {
      routeStr = '—';
    } else {
      routeStr = '·';
    }
    return `<div class="fl${isSel?' sel':''}" onclick="selectFlight('${f.icao24}')">
      <span class="cs">${(f.callsign||f.icao24).slice(0,8)}</span>
      <span class="muted">${f.alt ? f.alt.toLocaleString() : '—'}</span>
      <span class="muted">${f.heading!=null ? f.heading+'°' : '—'}</span>
      <span class="muted">${f.speed||'—'}</span>
      <span class="route-short">${routeStr}</span>
    </div>`;
  }).join('');
}

function selectFlight(icao24) {
  selected = flights.find(f => f.icao24 === icao24) || null;
  renderList();
  renderCard();
  // kick off route fetch if not cached
  if (selected && !routeCache[selected.icao24] && selected.callsign) {
    fetchRoute(selected.icao24, selected.callsign);
  }
}

// ── OpenSky fetch ─────────────────────────────────────────────────────────────
async function fetchFlights() {
  const pad = radiusKm / 111 * 1.1;
  const url = `https://opensky-network.org/api/states/all?lamin=${userLat-pad}&lomin=${userLon-pad*1.6}&lamax=${userLat+pad}&lomax=${userLon+pad*1.6}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    flights = (data.states || [])
      .filter(s => s[5] && s[6] && !s[8])
      .map(s => ({
        icao24: s[0],
        callsign: (s[1]||'').trim() || s[0],
        lat: s[6], lon: s[5],
        alt: s[7] ? Math.round(s[7] * 3.28084) : null,
        heading: s[10] != null ? Math.round(s[10]) : null,
        speed: s[9] ? Math.round(s[9] * 1.94384) : null,
        country: s[2]
      }))
      .filter(f => haversine(userLat, userLon, f.lat, f.lon) <= radiusKm);

    // Prefetch routes for first 20 visible flights (rate-limit friendly)
    flights.slice(0,20).forEach(f => {
      if (f.callsign && !routeCache[f.icao24] && !fetchingRoutes.has(f.icao24)) {
        fetchRoute(f.icao24, f.callsign);
      }
    });

    document.getElementById('traffic-lbl').textContent = 'TRAFFIC: ' + flights.length;
    document.getElementById('api-lbl').textContent = 'SRC: OPENSKY';
  } catch(e) {
    console.warn('OpenSky unavailable, using demo data:', e);
    useDemoData();
    document.getElementById('api-lbl').textContent = 'SRC: DEMO DATA';
  }

  // keep selected in sync
  if (selected) {
    const updated = flights.find(f => f.icao24 === selected.icao24);
    if (updated) { selected = updated; renderCard(); }
  }

  renderList();
  document.getElementById('time-lbl').textContent = new Date().toUTCString().slice(17,25) + ' UTC';
}

function useDemoData() {
  const demo = [
    ['SAS123','Norway',35000,045,460],['NOZ456','Norway',28000,180,380],
    ['DLH789','Germany',38000,270,480],['BAW321','United Kingdom',31000,095,420],
    ['RYR654','Ireland',25000,355,410],['EZY987','United Kingdom',33000,200,450],
    ['NAX111','Norway',29000,130,390],['KLM333','Netherlands',36000,310,470],
    ['AFR444','France',34000,060,440],['IBE555','Spain',37000,240,460],
    ['WUK222','United Kingdom',22000,170,350],['SWR666','Switzerland',32000,290,430],
    ['TAP888','Portugal',39000,080,490],['FIN999','Finland',27000,220,400],
  ];
  flights = demo.map(([cs,country,alt,hdg,spd]) => {
    const angle = Math.random() * Math.PI * 2;
    const dist = (0.1 + Math.random() * 0.85) * radiusKm;
    const dlat = dist / 111 * Math.cos(angle);
    const dlon = dist / 111 * Math.sin(angle) / Math.cos(userLat * Math.PI / 180);
    return { icao24: cs.toLowerCase(), callsign: cs, lat: userLat+dlat, lon: userLon+dlon, alt, heading: hdg, speed: spd, country };
  });
  document.getElementById('traffic-lbl').textContent = 'TRAFFIC: ' + flights.length + ' (DEMO)';
}

// ── Init ──────────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  setupCanvases();
  drawStatic();
  animateSweep();
  loadAirports();
  fetchFlights();
  setInterval(fetchFlights, 15000);

  document.getElementById('range-sl').addEventListener('input', e => {
    radiusKm = +e.target.value;
    document.getElementById('range-lbl').textContent = radiusKm + ' km';
    drawStatic();
    fetchFlights();
  });

  document.getElementById('pos-lbl').textContent =
    `${userLat.toFixed(3)}°N ${userLon.toFixed(3)}°E`;
}

function requestLoc() {
  document.getElementById('err-msg').textContent = '';
  if (!navigator.geolocation) { useOslo(); return; }
  navigator.geolocation.getCurrentPosition(
    p => { userLat = p.coords.latitude; userLon = p.coords.longitude; startApp(); },
    () => { document.getElementById('err-msg').textContent = 'Permission denied — loading demo position.'; setTimeout(useOslo, 1400); },
    { timeout: 8000 }
  );
}
function useOslo() { userLat = 59.9139; userLon = 10.7522; startApp(); }
</script>
